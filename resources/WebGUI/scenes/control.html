<div id="control" class="scene-main">

  <h3>Start the system:</h3>
	<div class="start-container" style="height: 30%;">
		<div>
			<p style="text-align: center;">Step #1:</p>
			<button id="system_start-button" onClick="SceneModule.SystemStart();" class="big-button">System: Start</button>
			<p style="text-align: center; color: white;"> <b id="pdu_start-status">&nbsp;</b></p>
		</div>

		<div style="display: inline; width: 40%; text-align: center; font-weight: bold;">
			Amplifier Status<br>
			<table style="text-align: center;">
				<thead style="font-weight: bold;">
					<th>1</th>
					<th>2</th>
					<th>3</th>
					<th>4</th>
					<th>5</th>
					<th>6</th>
					<th>7</th>
					<th>8</th>
				</thead>
				<tr>
					<td id="amp1-status" onclick="SceneModule.AmpStatusLegend();">&#9711;</td>
					<td id="amp2-status" onclick="SceneModule.AmpStatusLegend();">&#9711;</td>
					<td id="amp3-status" onclick="SceneModule.AmpStatusLegend();">&#9711;</td>
					<td id="amp4-status" onclick="SceneModule.AmpStatusLegend();">&#9711;</td>
					<td id="amp5-status" onclick="SceneModule.AmpStatusLegend();">&#9711;</td>
					<td id="amp6-status" onclick="SceneModule.AmpStatusLegend();">&#9711;</td>
					<td id="amp7-status" onclick="SceneModule.AmpStatusLegend();">&#9711;</td>
					<td id="amp8-status" onclick="SceneModule.AmpStatusLegend();">&#9711;</td>
				</tr>
			</table>
			<button id="control-Update_Status" class="small-button" style="margin: 0 auto;">Update Status</button>
		</div>

		<div>
			<p style="text-align: center;">Step #2:</p>
			<button id="amps_unmute-button" onClick="send('/app/amps_unmute/control', 'launch'); document.getElementById('amps_unmute-button').disabled = true;" class="big-button">Amps: Unmute</button>
			<p style="text-align: center; color: white;"><b id="amps_unmute-status">&nbsp;</b></p>
		</div>
	</div>

	<h3>Shutdown the system:</h3>
	<div class="start-container" style="height: 30%;">
		<div>
			<p style="text-align: center;">Step #1:</p>
			<button id="amps_mute-button" onClick="send('/app/amps_mute/control', 'launch'); document.getElementById('amps_mute-button').disabled = true;" class="big-button">Amps: Mute</button>
			<p style="text-align: center; color: white;"><b id="amps_mute-status">&nbsp;</b></p>
		</div>
		<div>
			<p style="text-align: center;">Step #2:</p>
			<button id="amps_shutdown-button" onClick="SceneModule.AmpsShutdown();" class="big-button">Amps: Shutdown</button>
			<p style="text-align: center; color: white;"><b id="amps_shutdown-status">&nbsp;</b></p>
		</div>
		<div>
			<p style="text-align: center;">Step #3:</p>
			<button id="system_shutdown-button" onClick="SceneModule.SystemShutdown();" class="big-button">System: Shutdown</button>
			<p style="text-align: center; color: white;"><b id="pdu_shutdown-status">&nbsp;</b></p>
		</div>
	</div>

	<h3>Special:</h3>
	<div class="start-container" style="height: 30%;">
		<div>
			<button disabled onClick="send('/matrix/snapshots/0/author', 'Piotr');" class="big-button">Matrix:<br>Load
				Default Snapshot</button>
			<p style="text-align: center;"> <b id="matrix_default-status">&nbsp;</b></p>
		</div>
		<div>
			<button disabled onClick="send('/totalmix/load_defaults', 'launch');" class="big-button">Mixer:<br>Load
				Default Routing</button>
			<p style="text-align: center;"> <b id="mixer_default-status">&nbsp;</b></p>
		</div>
		<div>
			<button onClick="SceneModule.CloseAllApps();" class="big-button">Apps:<br>Close'em all</button>
			<p style="text-align: center;"> <b id="kill-status">&nbsp;</b></p>
		</div>
	</div>



</div>
