<div id="demo_jungle" class="scene-main">

  <h3>Simulates an environment in a jungle.</h3>
	<div class="start-container">
	
		<div class="slider-group">
			<div style="gap: 10px;">
				<button onClick="launchAppAndWait('demo_jungle', 'pd_jungle', 5, SceneModule.init, SceneModule.connect);" class="big-button">Launch App</button>
				<p style="text-align: center;">Status: <b id="pd_jungle-status">unclear</b></p>		
				<p style="text-align: center;">
					Version: <b id="pd_jungle-Control_Version">unknown</b>
					<br>
					Sample rate: <b id="pd_jungle-Control_SampleRate">unknown</b> Hz
				</p>				
			</div>
			
			<div style="gap: 10px;">
				<button disabled id="pd_jungle-Play_Start" class="big-button" onClick="sendNoArgs('/app/pd_jungle/osc/Play/Start')">Play</button>
				<p style="text-align: center;"><b id="timecode">0:0.0</b> of <b id="duration">0:0.0</b></p>
				<button disabled id="pd_jungle-Play_Stop" class="big-button" onClick="sendNoArgs('/app/pd_jungle/osc/Play/Stop')">Stop</button>
			</div>

			<br>
			<p style="text-align: center; color: white;"><b id="pd_jungle-Play_Timecode">0</b><b id="pd_jungle-Play_Duration">0</b></p>
			<button onClick="quitApp('demo_jungle', 'pd_jungle', SceneModule.init)" class="big-button">Quit App</button>
		</div>

		<div class="slider-group">
			<span>Volume</span>
			<input disabled id="volume-slider" class="volume-slider" style="height: 400px;" type=range min="-80" max="20" value="0" oninput="sendValue('/app/pd_jungle/osc/Play/Volume/Set', this.value); document.getElementById('volume-number').innerText = this.value + ' dB';">
			<div class="level-box" id="volume-number">--</div>
			<p style="text-align: center; color: white;"><b id="pd_jungle-Play_Volume">&nbsp;</b></p>
		</div>

		<div class="slider-group">
			<span>Level</span>
			<div class="meter-container" style="height: 400px;" >
				<div class="meter-bar" id="pd_jungle-Play_VU-bar" style="width: 0%;"></div>
			</div>
			<div class="level-box" id="pd_jungle-Play_VU-number">--</div>
			<p style="text-align: center; color: white;"><b id="pd_jungle-Play_VU">&nbsp;</b></p>
		</div>
	</div>
	
</div>
