<div id="demo_fly" class="scene-main">

  <h3>Plays a fly flying around.</h3>
	<div class="start-container">
	
		<div class="slider-group">
			<div style="gap: 10px;">
				<button class="big-button" onClick="launchAppAndWait('demo_fly', 'pd_fly', 5, SceneModule.init, SceneModule.connect);">Launch App</button>
				<p style="text-align: center;">Status: <b id="pd_fly-status">unclear</b></p>		
				<p style="text-align: center;">
					Version: <b id="pd_fly-Control_Version">unknown</b>
					<br>
					Sample rate: <b id="pd_fly-Control_SampleRate">unknown</b> Hz
				</p>				
			</div>
			
			<div style="gap: 10px;">
				<button class="big-button" onClick="sendNoArgs('/app/pd_fly/osc/Play/Start')">Play</button>
				<p style="text-align: center;"><b id="timecode">0:0.0</b> of <b id="duration">0:0.0</b></p>
				<button class="big-button" onClick="sendNoArgs('/app/pd_fly/osc/Play/Stop')">Stop</button>
			</div>

			<p style="text-align: center; color: white;"><b id="pd_fly-Play_Timecode">0</b><b id="pd_fly-Play_Duration">0</b></p>
			<button class="big-button" onClick="quitApp('demo_fly', 'pd_fly', SceneModule.init)">Quit App</button>
		</div>

		<div class="slider-group">
			<span>Volume</span>
			<input class="volume-slider" id="volume-slider" style="height: 400px;" type=range min="0" max="100" value="0" oninput="sendValue('/app/pd_fly/osc/Play/Volume/Set', this.value); document.getElementById('volume-number').innerText = this.value + ' dB';">
			<div class="level-box" id="volume-number">--</div>
			<p style="text-align: center; color: white;"><b id="pd_fly-Play_Volume">&nbsp;</b></p>
		</div>
		<div class="slider-group">
			<span>Level</span>
			<div class="meter-container" style="height: 400px;">
				<div class="meter-bar" id="pd_fly-Play_VU-bar"></div>
			</div>
			<div class="level-box" id="pd_fly-Play_VU-number">--</div>
			<p style="text-align: center; color: white;"><b id="pd_fly-Play_VU">&nbsp;</b></p>
		</div>
	</div>
	
</div>
