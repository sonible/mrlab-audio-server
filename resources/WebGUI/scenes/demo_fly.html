<div id="demo_fly" class="scene-main">

	<style>
		.big-button {
			width: 300px;
			padding: 40px;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			font-size: 24px;
			font-weight: bold;			
			cursor: pointer;
		}
		
		.small-button {
			width: 200px;
			padding: 40px;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			font-size: 18px;
			font-weight: bold;			
			cursor: pointer;
		}

		.start-container {
			display: flex;
			justify-content: space-between; /* Pushes content to far left and far right */
			align-items: center;
			height: 60%;
			padding: 20px;
			border: 1px solid #ccc;
			width: 100%;
		}
		
		.button-group {
			box-sizing: border-box;
			display: flex;
			flex-direction: column;
			justify-content: space-evenly;
			align-items: center;
			gap: 50px;
			width: 80%;
			height: 60%;
		}

		.slider-group { /* Group with the sliders, fills the entire vertical height */
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			width: 40%;
			height: 100%;
		}
		.volume-slider { /* Style to make a vertical volume slider */
			writing-mode: vertical-lr;
			direction: rtl;
			width: 20px;
			height: 60%;
		}
		.volume-box {
			font-family: monospace;
			font-size: 1.2rem;
			background: #007bff;
			color: white;
			padding: 5px 10px;
			border-radius: 4px;
			width: 100px;
			text-align: center;
		}		
	</style>


	<h2>Demo: Fly</h2>
	<div class="start-container">
	
		<div class="button-group">
			<div style="gap: 10px;">
				<button onClick="launchAppAndWait('demo_fly', 'pd_fly', 5, SceneModule.init, SceneModule.connect)" class="big-button">Launch App</button>
				<p style="text-align: center;">Status: <b id="pd_fly-status">unclear</b></p>
			</div>

			<button onClick="sendNoArgs('/app/pd_fly/osc/Play/Start')" class="big-button">Play</button>
			<button onClick="sendNoArgs('/app/pd_fly/osc/Play/Stop')"class="big-button">Stop</button>
			<div style="gap: 10px;">
				<p style="text-align: center;">Version: <b id="pd_fly-Control_Version">unknown</b></p>	
				<p style="text-align: center;">Sample rate: <b id="pd_fly-Control_SampleRate">unknown</b> Hz</p>
			</div>
			<button onClick="quitApp('demo_fly', 'pd_fly', SceneModule.init)" class="big-button">Quit App</button>
		</div>

		<div class="slider-group">
			<span>Volume</span><br>
			<input type=range min="1" max="100" value="60" oninput="sendValue('/app/pd_fly/osc/SetVol', this.value); document.getElementById('volume-box').innerText = this.value;" class="volume-slider">
			<div class="volume-box" id="volume-box">60</div>
		</div>
		<div class="slider-group">
			<span>Level</span><br>
			<input type=range min="1" max="100" value="0" class="volume-slider" disabled id="pd_fly-Level-slider">
			<div class="volume-box" id="pd_fly-Level">--</div>
		</div>
	</div>
	
</div>
