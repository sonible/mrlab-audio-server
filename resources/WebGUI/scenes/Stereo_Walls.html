<div id="Stereo_Walls" class="scene-main">

  <h3>Plays stereo audio via walls of loudspeakers. Left channel via the north wall; Right channel via the south wall.</h3>
	<div class="start-container" style="height: 30%;">
    <div class="button-group" style="gap: 0px;">
      <button onClick="launchAppAndWait('Stereo_Walls', 'Stereo_Walls', 5, SceneModule.init, SceneModule.connect);" class="big-button">Launch App</button>
      <p style="text-align: center;">
        Status: <b id="Stereo_Walls-status">unclear</b>
        <br>	
        Version: <b id="Stereo_Walls-Control_Version">unknown</b>
      </p>				
    </div>
  </div>

	<div class="start-container" style="height: 60%;">
    <div class="button-group" style="width: 30%; height: 100%; gap: 0px;">
      <span style="text-align: center; font-weight: bold; gap: 0px;">Inputs</span>
      <div class="start-container" style="height: 100%; gap: 0px;">
        <div id="input-buttons-container" style="text-align: center;">
          <!-- Input buttons will be injected here by input-controls.js -->
        </div>
        <div id="input-group-container" class="input-group" style="gap: 0px;">
          <!-- Input sections will be injected here by input-controls.js -->
        </div>
      </div>
		</div>

    <div class="button-group" style="width: 55%; height: 100%; gap: 0px;">
      <span style="text-align: center; font-weight: bold; gap: 0px;">Wall Levels</span>
      <div id="wall-levels" class="start-container" style="height: 95%; text-align: center; gap:0px;">
        <div class="slider-group">
          <b style="min-height: 1em">CAVE</b><br>
          <button disabled id="btn-wall-CAVE" class="small-button" style="width: 50px;" onclick="SceneModule.toggleWallStateCAVE()">Off</button>          
          <input disabled id="volume-CAVE-slider" class="volume-slider" style="opacity: 0.5;" type=range min="-60" max="20" value="-60" 
            oninput="sendValue('/app/Stereo_Walls/osc/CAVE/Volume/Set', this.value); document.getElementById('volume-CAVE-number').innerText = this.value + ' dB';">
          <div id="volume-CAVE-number" class="level-box">--</div>
          <span style="text-align: center; color: white;" id="Stereo_Walls-CAVE_Volume">&nbsp;</span>
        </div>
        <div class="slider-group">
          <b style="min-height: 1em">CAVE Door</b><br>
          <button id="btn-wall-CAVEDoor" class="small-button" style="width: 50px;" onclick="SceneModule.toggleWallStateApp('CAVEDoor')">Off</button>
          <input id="volume-CAVEDoor-slider" class="volume-slider" disabled style="opacity: 0.5;" type=range min="-60" max="20" value="-60" 
            oninput="sendValue('/app/Stereo_Walls/osc/CAVEDoor/Volume/Set', this.value); document.getElementById('volume-CAVEDoor-number').innerText = this.value + ' dB';">
          <div id="volume-CAVEDoor-number" class="level-box">--</div>
          <span style="text-align: center; color: white;" id="Stereo_Walls-CAVEDoor_Volume">&nbsp;</span>
        </div>
        <div class="slider-group">
          <b style="min-height: 1em">Spatial Audio</b><br>
          <button id="btn-wall-SA" class="small-button" style="width: 50px;" onclick="SceneModule.toggleWallStateApp('SA')">Off</button>
          <input id="volume-SA-slider" class="volume-slider" disabled style="opacity: 0.5;" type=range min="-60" max="20" value="-60" 
            oninput="sendValue('/app/Stereo_Walls/osc/SA/Volume/Set', this.value); document.getElementById('volume-SA-number').innerText = this.value + ' dB';">
          <div id="volume-SA-number" class="level-box">--</div>
          <span style="text-align: center; color: white;" id="Stereo_Walls-SA_Volume">&nbsp;</span>
        </div>
        <div class="slider-group">
          <b style="min-height: 1em">Curved Door</b><br>
          <button id="btn-wall-CurvedDoor" class="small-button" style="width: 50px;" onclick="SceneModule.toggleWallStateApp('CurvedDoor')">Off</button>
          <input id="volume-CurvedDoor-slider" class="volume-slider" disabled style="opacity: 0.5;" type=range min="-60" max="20" value="-60" 
            oninput="sendValue('/app/Stereo_Walls/osc/CurvedDoor/Volume/Set', this.value); document.getElementById('volume-CurvedDoor-number').innerText = this.value + ' dB';">
          <div id="volume-CurvedDoor-number" class="level-box">--</div>
          <span style="text-align: center; color: white;" id="Stereo_Walls-CurvedDoor_Volume">&nbsp;</span>
        </div>
        <div class="slider-group">
          <b style="min-height: 1em">Curved</b><br>
          <button id="btn-wall-Curved" class="small-button" style="width: 50px;" onclick="SceneModule.toggleWallStateCurved()">Off</button>
          <input id="sum_bus_master-volume-slider" disabled class="volume-slider" style="opacity: 0.5;" type=range min="-60" max="20" value="-60"
            oninput="sendValue('/matrix/settings/sum_bus_master/0/gain', this.value); sendValue('/matrix/settings/sum_bus_master/1/gain', this.value); document.getElementById('sum_bus_master-volume-number').innerText = this.value + ' dB';">
          <div id="sum_bus_master-volume-number" class="level-box">--</div>
          <span id="sum_bus_master-gain" style="text-align: center; color: white;">&nbsp;</span>
        </div>
      </div>
    </div>

    <div class="button-group" style="width: 15%; height: 100%; gap: 0px;">
      <span style="text-align: center; font-weight: bold; gap: 0px;">Total</span>
      <div class="start-container">
        <div class="slider-group">
          <b>Volume</b>
          <input disabled id="Stereo_Walls-Total_Volume-slider" class="volume-slider" style="height: 350px;" type=range min="-60" max="20" value="-60" 
            oninput="document.getElementById('Stereo_Walls-Total_Volume-number').innerText = this.value + ' dB';">
          <div id="Stereo_Walls-Total_Volume-number" class="level-box">--</div>
          <span id="Stereo_Walls-Total_Volume" style="text-align: center; color: white;">&nbsp;</span>
        </div>
        <div class="slider-group">
          <b>Level</b>
          <div class="meter-container" style="height: 80%;">
            <div class="meter-bar" id="Stereo_Walls-Total_VU-bar"></div>
          </div>
          <div class="level-box" id="Stereo_Walls-Total_VU-number">--</div>
          <span style="text-align: center; color: white;" id="Stereo_Walls-Total_VU">&nbsp;</span>
        </div>
      </div>
    </div>
	</div>

	<div class="start-container" style="height: 8%; width: 100%; justify-content: center;">
		<button class="big-button" style="width: 30%;" onClick="quitApp('Stereo_Walls', 'Stereo_Walls', SceneModule.init)">Quit App</button>
	</div>
	
</div>
