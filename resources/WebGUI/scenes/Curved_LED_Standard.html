<div id="Curved_LED_Standard" class="scene-main">

	<h2>Spatial Audio: VBAP</h2>
	<div class="start-container">
	
		<div class="button-group">
			<div style="gap: 10px;">
				<button onClick="lockScene('Curved_LED_Standard');" class="big-button">Lock</button>
				<p style="text-align: center;">Status: <b id="Curved_LED_Standard-status">unclear</b></p>		
				<p style="text-align: center;">
					Version: <b id="Curved_LED_Standard-Control_Version">unknown</b>
					<br>
					Sample rate: <b id="Curved_LED_Standard-Control_SampleRate">unknown</b> Hz
				</p>				
			</div>
			
			<div id="input-buttons-container" style="gap: 10px;">
        <!-- Input buttons will be injected here by input-controls.js -->
			</div>

			<br>
			
			<button onClick="unlockScene('Curved_LED_Standard');" class="big-button">Reset and Unlock</button>
		</div>

		<div id="input-group-container" class="input-group">
      <!-- Input sections will be injected here by input-controls.js -->
		</div>
    
		<div class="slider-group">
			<span>Volume</span>
			<br>
			<input type=range min="0" max="100" value="0" oninput="sendValue('/app/Curved_LED_Standard/osc/Total/Volume/Set', this.value); document.getElementById('volume-number').innerText = this.value + ' dB';" class="volume-slider" id="volume-slider">
			<br>
			<div class="level-box" id="volume-number">--</div>
			<p style="text-align: center; color: white;"><b id="Curved_LED_Standard-Total_Volume">&nbsp;</b></p>
		</div>
		<div class="slider-group">
			<span>Level</span>
			<br>
			<div class="meter-container">
				<div class="meter-bar" id="Curved_LED_Standard-Total_VU-bar"></div>
			</div>
			<br>
			<div class="level-box" id="Curved_LED_Standard-Total_VU-number">--</div>
			<p style="text-align: center; color: white;"><b id="Curved_LED_Standard-Total_VU">&nbsp;</b></p>
		</div>
	</div>
	
</div>
