<div id="demo_music" class="scene-main">

	<style>
		.big-button {
			width: 300px;
			padding: 40px;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			font-size: 24px;
			font-weight: bold;			
			cursor: pointer;
		}
		
		.small-button {
			width: 200px;
			padding: 40px;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			font-size: 18px;
			font-weight: bold;			
			cursor: pointer;
		}

		.start-container {
			display: flex;
			justify-content: space-between; /* Pushes content to far left and far right */
			align-items: center;
			height: 60%;
			padding: 20px;
			border: 1px solid #ccc;
			width: 100%;
		}
		
		.button-group {
			box-sizing: border-box;
			display: flex;
			flex-direction: column;
			justify-content: space-evenly;
			align-items: center;
			gap: 50px;
			width: 80%;
			height: 60%;
		}

		.slider-group { /* Group with the sliders, fills the entire vertical height */
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			width: 40%;
			height: 100%;
		}
		.volume-slider { /* Style to make a vertical volume slider */
			writing-mode: vertical-lr;
			direction: rtl;
			width: 20px;
			height: 600px;
		}
		.level-box { /* Style to display a level */
			font-family: monospace;
			font-size: 1.2rem;
			background: #007bff;
			color: white;
			padding: 5px 10px;
			border-radius: 4px;
			width: 130px;
			text-align: center;
		}
		.vu-meter {
			transform: rotate(-90deg);
			width: 150px; /* This becomes the height */
			height: 20px; /* This becomes the thickness */
		}
		.meter-container {
			width: 30px;
			height: 600px;
			background-color: #333;
			border: 2px solid #000;
			position: relative;
			display: flex;
			align-items: flex-end; /* Ensures the bar "grows" from the bottom */
		}

		.meter-bar {
			width: 100%;
			height: 60%; /* Change this percentage to move the meter */
			background: linear-gradient(to top, green 0%, yellow 70%, red 100%);
			transition: height 0.1s ease; /* Smooth movement */
		}		
  }
	</style>


	<h2>Demo: Music</h2>
	<div class="start-container">
	
		<div class="button-group">
			<div style="gap: 10px;">
				<button onClick="launchApp('demo_music','reaper_music');" class="big-button">Launch App</button>
				<p style="text-align: center;">Status: <b id="reaper_music-status">unclear</b></p>		
			</div>
			
			<div style="gap: 10px;">
				<button onClick="sendNoArgs('/app/reaper_music/osc/play')" class="big-button">Play/Pause</button>
				<p style="text-align: center;"><b id="timecode">0:0.0</b> of <b id="duration">4:20.0</b></p>
				<button onClick="sendValue('/app/reaper_music/osc/time', 0)"class="big-button">Rewind</button>
				<button onClick="sendNoArgs('/app/reaper_music/osc/stop')"class="big-button">Stop</button>
			</div>

			<br>
			<p style="text-align: center; color: white;"><b id="reaper_music-time">0</b><b id="reaper_music-Play_Duration">0</b></p>
			<button onClick="quitApp('demo_music', 'reaper_music', SceneModule.init)" class="big-button">Quit App</button>
		</div>

		<div class="slider-group">
			<span>Volume</span>
			<br>
			<input type=range min="-88" max="12" value="0" oninput="sendValue('/app/reaper_music/osc/track/7/volume/db', this.value); document.getElementById('volume-number').innerText = this.value + ' dB';" class="volume-slider" id="volume-slider">
			<br>
			<div class="level-box" id="volume-number">0 dB</div>
			<p style="text-align: center; color: white; font-size: 8px;"><b id="reaper_music-track_7_volume_db">&nbsp;</b></p>
		</div>
		<div class="slider-group">
			<span>Level</span>
			<br>
			<div class="meter-container">
				<div class="meter-bar" id="reaper_music-Play_VU-bar"></div>
			</div>
			<br>
			<div class="level-box" id="reaper_music-Play_VU-number">--</div>
			<p style="text-align: center; color: white; font-size: 8px;"><b id="reaper_music-track_7_vu">blah&nbsp;</b></p>
		</div>
	</div>
	
</div>
