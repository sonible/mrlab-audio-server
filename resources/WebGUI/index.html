<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>MR Lab Audio</title>
    <link rel="stylesheet" href="style.css">
    <script src="scripts/osc-browser.min.js"></script>
		<script src="scripts/main.js"></script>
    <script src="scripts/osc-handler.js"></script>
  </head>
  <body>
	
	<header class="top-menu-bar">
		<h1>Mixed-Reality Lab: Audio Server</h1>
	</header>
	
	<div class="main-layout-horizontal">
		
		<aside class="scenes-sidebar" id="scene-sidebar">
			<button id="button-control" onclick="loadScene('control', this)">Control</button>
			<div class="sidebar-spacer"></div>
			<button disabled id="button-Curved_LED_Stereo" onclick="loadScene('Curved_LED_Stereo', this)">Curved LED: Stereo</button>
			<button disabled id="button-Curved_LED_Surround" onclick="loadScene('Curved_LED_Surround', this)">Curved LED: Surround</button>
			<button disabled id="button-Curved_LED_Telco" onclick="loadScene('Curved_LED_Telco', this)">Curved LED: Telco</button>
			<button disabled id="button-Stereo_Walls" onclick="loadScene('Stereo_Walls', this)">Stereo Walls</button>
      <button id="button-SA_VBAP" onclick="loadScene('SA_VBAP', this)">Spatial Audio: VBAP</button>			
			<div class="sidebar-spacer"></div>
			<button id="button-demo_fly" onclick="loadScene('demo_fly', this)">Demo: Fly</button>
			<button id="button-demo_reverb" onclick="loadScene('demo_reverb', this)">Demo: Reverb</button>
			<button id="button-demo_jungle" onclick="loadScene('demo_jungle', this)">Demo: Jungle</button>
			<button id="button-demo_music" onclick="loadScene('demo_music', this)">Demo: Music</button>
			<div class="sidebar-spacer"></div>
			<button disabled id="button-demo_error" onclick="loadScene('custom-scene', this)">Custom Scene</button>
			<button disabled id="button-demo_error" onclick="loadScene('custom-scene', this)">Custom Scene</button>
			<button disabled id="button-demo_error" onclick="loadScene('custom-scene', this)">Custom Scene</button>
			<button disabled id="button-demo_error" onclick="loadScene('custom-scene', this)">Custom Scene</button>
			<button disabled id="button-demo_error" onclick="loadScene('custom-scene', this)">Custom Scene</button>
			<button disabled id="button-demo_error" onclick="loadScene('custom-scene', this)">Custom Scene</button>
			<button disabled id="button-demo_error" onclick="loadScene('custom-scene', this)">Custom Scene</button>
			<button disabled id="button-demo_error" onclick="loadScene('custom-scene', this)">Custom Scene</button>
			<button disabled id="button-demo_error" onclick="loadScene('custom-scene', this)">Custom Scene</button>
			<button disabled id="button-demo_error" onclick="loadScene('custom-scene', this)">Custom Scene</button>
			<button id="button-demo_error2" onclick="loadScene('last-scene', this)">Last Scene</button>
      <div class="sidebar-spacer"></div>
      <p style="text-align: center;"><span id="git-version">Loading version...</span></p>
      <p style="text-align: center;">
        fan-i12minus: <span id="fan-i12minus">---</span><br>
        fan-power: <span id="fan-power">---</span><br>
        fan-imain: <span id="fan-imain">---</span><br>
        fan-temp1: <span id="fan-temp1">---</span><br>
        fan-cpu-temp: <span id="fan-cpu-temp">---</span><br>
        fan-temp_local: <span id="fan-temp_local">---</span><br>
      </p>
		</aside>

		<main class="scene-port" id="scene-port">
			<div class="scene-main">
				<h2>Welcome to the Audio Server of the Mixed-Reality Lab.</h2>
				<p>Select a scene on the left.</p>
			</div>
    </main>	

	</div>	

	<dialog id="confirmDialog" style="margin: auto; padding:100px;">
		<h2 id="confirmTitle">Title</h2>
		<p id="confirmText">Are you sure?</p>
		<br>
		<button id="okBtn" >OK</button>
		<br><br>
		<button id="cancelBtn" >Cancel</button>
	</dialog>
	
	<dialog id="infoDialog" style="margin: auto; padding:100px;">
		<h2 id="infoTitle">Title</h2>
		<p id="infoText">Info message...</p>
		<br>
		<button id="infoOkBtn" >OK</button>
	</dialog>
	
  </body>
</html>
