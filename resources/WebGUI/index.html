<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>MR Lab Audio</title>
    <link rel="stylesheet" href="style.css">
    <script src="scripts/osc-browser.min.js"></script>
		<script src="scripts/main.js"></script>
    <script src="scripts/osc-handler.js"></script>
  </head>
  <body>
	
	<header class="top-menu-bar">
		<h1>Mixed-Reality Lab: Audio Server</h1>
	</header>
	
	<div class="main-layout-horizontal">
		
		<aside class="scenes-sidebar">
			<button id="button-control" onclick="loadScene('control', this)">Control</button>
			<br><br><br>
			<button id="button-Curved_LED_Standard" onclick="loadScene('Curved_LED_Standard', this)">Curved LED: Standard</button>
			<button id="button-Curved_LED_Surround" onclick="loadScene('Curved_LED_Surround', this)">Curved LED: Surround</button>
			<button id="button-SA_XX_VBAP" onclick="loadScene('SA_XX_VBAP', this)">Spatial Audio: VBAP</button>			
			<br><br><br>
			<button id="button-demo_fly" onclick="loadScene('demo_fly', this)">Demo: Fly</button>
			<button id="button-demo_reverb" onclick="loadScene('demo_reverb', this)">Demo: Reverb</button>
			<button id="button-demo_jungle" onclick="loadScene('demo_jungle', this)">Demo: Jungle</button>
			<button id="button-demo_music" onclick="loadScene('demo_music', this)">Demo: Music</button>
			<br><br><br>
			<button id="button-demo_error" onclick="loadScene('custom-scene', this)">Custom Scene</button>
			<button id="button-demo_error2" onclick="loadScene('last-scene', this)">Last Scene</button>
		</aside>

		<main class="scene-port" id="scene-port">
			<div class="scene-main">
				<h2>Welcome to the Audio Server of the Mixed-Reality Lab.</h2>
				<p>Select a scene on the left.</p>
			</div>
    </main>	

	</div>	

	<dialog id="confirmDialog" style="margin: auto; padding:100px;">
		<h2 id="confirmTitle">Title</h2>
		<p id="confirmText">Are you sure?</p>
		<br>
		<button id="okBtn" >OK</button>
		<br><br>
		<button id="cancelBtn" >Cancel</button>
	</dialog>
	
  </body>
</html>
