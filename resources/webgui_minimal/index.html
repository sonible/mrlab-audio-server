<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>mrlab webgui test</title>
    <link rel="stylesheet" href="style.css">
    <script src="script/osc-browser.min.js"></script>
    <script>
      var oscPort = new osc.WebSocketPort({
          url: "ws://localhost:7080/ws",
          metadata: true
      });
      oscPort.open();

      function send(address, value) {
          oscPort.send({
              address: address,
	      args: [
		  {
		      type: "s",
		      value: value
		  }
	      ]
          });
      };

      function sendResponse(address) {
          oscPort.send({
              address: address,
	      args: [
		  {
		      type: "s",
		      value: "connect"
		  },
		  {
		      type: "s",
		      value: "localhost"
		  },
		  {
			  type: "i",
			  value: 9336
		  }
		  ]
          });
      };

      function sendNoArgs(address) {
          oscPort.send({
              address: address
          });
      };

      oscPort.on("ready", function () {
          oscPort.send({ address: "/ping" });
      });

      oscPort.on("message", function (oscMsg) {
		console.log("OSC message received: ", oscMsg);

		path = oscMsg.address.substring(1).split("/");

		if (path[0] == "app" && path[2] == "state") {
			// Show status info.
			document.getElementById(path[1] + "_status").innerHTML = oscMsg.args[1].value;
			return;
		};

		if (path[1] != "pd-yami-1") {
			console.log("No OSC message handler: ", oscMsg.address);
			return;
		};
			
		if (path[2] == "osc" && path[3] == "Control") {
			// Show response infos.
			document.getElementById(path[1] + "_" + path[4]).innerHTML = oscMsg.args[0].value;
			return;
		};

		console.log("No OSC message handler: ", oscMsg.address);	
      });
    </script>
  </head>
  <body>
    <h1>mrlabctrl web gui</h1>
    <p>
      This is a minimal test web gui for mrlabctrl.
    </p>
    <p>
      <button onClick="send('/app/reaper-empty-0/control', 'launch')">Launch Reaper</button>
      <button onClick="send('/app/reaper-empty-0/control', 'quit')">Quit Reaper</button>
      Status: <b id="reaper-empty-0_status">null</b>
    </p>
    <p>
      <button onClick="send('/app/pd-yami-1/control', 'launch')">Launch YAMI</button>
      <button onClick="send('/app/pd-yami-1/control', 'quit')">Quit YAMI</button>
      <button onClick="sendResponse('/app/pd-yami-1/osc/Control/Response')">Connect Response</button>
      <button onClick="sendNoArgs('/app/pd-yami-1/osc/Control/Version')">Get Version</button>
      <button onClick="sendNoArgs('/app/pd-yami-1/osc/Control/SampleRate')">Get Samplerate</button>
      <button onClick="sendNoArgs('/app/pd-yami-1/osc/Control/CPULoad')">Get CPU</button>
      <br />
	  Status: <b id="pd-yami-1_status">null</b>
      Version: <b id="pd-yami-1_Version">null</b>
      Samplerate: <b id="pd-yami-1_SampleRate">null</b>
      CPU %: <b id="pd-yami-1_CPULoad">null</b>
    </p>
  </body>
</html>
