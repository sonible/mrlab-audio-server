<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Mixed-Reality Lab: Audio Server</title>
    <link rel="stylesheet" href="style.css">
    <script src="scripts/osc-browser.min.js"></script>
		<script src="scripts/main.js"></script>
    <script src="scripts/osc-handler.js"></script>
  </head>
  <body>
	
	<header class="top-menu-bar">
		<h1>MR Lab</h1>
	</header>
	
	<div class="main-layout-horizontal">
		
		<aside class="scenes-sidebar">
			<button id="button-demo-fly" onclick="loadScene('demo-fly', this)">Fly</button>
			<button id="button-demo-reverb" onclick="loadScene('demo-reverb', this)">Reverb</button>
			<button id="button-demo-jungle" onclick="loadScene('demo-jungle', this)">Jungle</button>
			<button id="button-demo-music" onclick="loadScene('demo-music', this)">Music</button>
			<button id="button-demo-error" onclick="loadScene('error', this)">Error</button>
		</aside>

		<main class="scene-port" id="scene-port">
			<div class="scene-main">
				<h2>Welcome to the Audio Server of the Mixed-Reality Lab.</h2>
				<p>Select a scene on the left.</p>
			</div>
    </main>		

	</div>		
  </body>
</html>
