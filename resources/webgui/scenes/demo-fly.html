<div id="demo-fly" class="scene-main">
	<button onClick="send('/app/pd-fly/control', 'launch')">Launch pd</button>
	<button onClick="send('/app/pd-fly/control', 'quit')">Quit pd</button>
	<button onClick="sendResponse('/app/pd-fly/osc/Control/Response')">Connect Response</button>
	<button onClick="sendNoArgs('/app/pd-fly/osc/Control/Version')">Get Version</button>
	<button onClick="sendNoArgs('/app/pd-fly/osc/Control/SampleRate')">Get Samplerate</button>
	<button onClick="sendNoArgs('/app/pd-fly/osc/Control/CPULoad')">Get CPU</button>
	<br />
		Status: <b id="pd-fly_status">null</b>
		Version: <b id="pd-fly_Version">null</b>
		Samplerate: <b id="pd-fly_SampleRate">null</b>
		CPU %: <b id="pd-fly_CPULoad">null</b>				
</div>
