<div id="demo-reverb" class="scene-main">
	<button onClick="send('/app/reaper-reverb/control', 'launch')">Launch Reaper</button>
	<button onClick="send('/app/reaper-reverb/control', 'quit')">Quit Reaper</button>
	<button onClick="sendNoArgs('/app/reaper-reverb/osc/play')">Play</button>
	<button onClick="sendNoArgs('/app/reaper-reverb/osc/pause')">Pause</button>
	<button onClick="sendNoArgs('/app/reaper-reverb/osc/stop')">Stop</button>
	Status: <b id="reaper-reverb_status">null</b>
</div>
