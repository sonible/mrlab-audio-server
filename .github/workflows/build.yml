name: Build and upload executables

on: [push, pull_request]

env:
  # CMake build type (Release, Debug, RelWithDebInfo)
  BUILD_TYPE: RelWithDebInfo

  # architectures to build for on macos
  OSX_ARCHITECTURES: ${{ '"arm64;x86_64"' }}

  # CPM cache subdirectory
  CPM_SOURCE_CACHE: ./cpm_cache

jobs:
  build:
    name: Build artefacts
    runs-on: ${{ matrix.config.runner }}

    strategy:
      matrix:
        config:
          - runner: windows-latest
            name: windows
            shell: powershell
            # defaults to MinGW-gcc, which is not supported by JUCE
            cc: clang-cl
            cxx: clang-cl

          - runner: macos-latest
            name: mac

          - runner: ubuntu-latest
            name: linux
      fail-fast: false

    steps:
      - uses: actions/checkout@v5

      - name: (Linux) Install dependencies
        # from https://github.com/juce-framework/JUCE/blob/master/docs/Linux%20Dependencies.md
        run: |
          sudo apt update && \
          sudo apt install -y --no-install-recommends \
          libasound2-dev libjack-jackd2-dev \
          ladspa-sdk \
          libcurl4-openssl-dev  \
          libfreetype-dev libfontconfig1-dev \
          libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev \
          libwebkit2gtk-4.1-dev \
          libglu1-mesa-dev mesa-common-dev
        if: runner.os == 'Linux'

      - name: Cache CPM dependencies
        uses: actions/cache@v4
        env:
          cache-name: cpm-source-cache
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: ${{ env.cache-name }}-${{ hashFiles('**/CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            ${{ env.cache-name }}-
          enableCrossOsArchive: true

      - name: Configure CMake
        run: cmake . -B build -G Ninja -D CMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -D CMAKE_OSX_ARCHITECTURES=${{ env.OSX_ARCHITECTURES }}
        env:
          CC: ${{ matrix.config.cc }}
          CXX: ${{ matrix.config.cxx }}

      - name: Build default targets
        run: cmake --build build/

      - uses: actions/upload-artifact@v4
        with:
          name: mrlabctrl-${{ matrix.config.name }}
          path: ./build/mrlabctrl_artefacts/${{ env.BUILD_TYPE }}/
          if-no-files-found: error
